
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Oliv Taller de Joyas</title>
    <meta
  name="description"
  content="Ingresá a tu cuenta de Oliv Taller de Joyas."
/>
    
    <link rel="stylesheet" href="css/custom.css">



<div class="bg-light d-flex align-items-center justify-content-center min-vh-100" style="background-color: #f8f6f2 !important;">
    
    <div class="container px-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                
                <div class="card border-0 shadow-lg p-4 rounded-4" style="background: #ffffff;">
                    
                    <div class="text-center mb-4">
                        <h1 class="h3 font-weight-bold text-dark mb-1">Ingresar a Oliv taller de Joyas</h1>
                       
                    </div>
                    
                    <form>
                        <div class="mb-3">
                            <label for="emailInput" class="form-label text-secondary small font-weight-bold">Correo Electrónico</label>
                            <input type="email" class="form-control form-control-lg rounded-3 fs-6" id="emailInput" placeholder="nombre@ejemplo.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="passwordInput" class="form-label text-secondary small font-weight-bold">Contraseña</label>
                            <input type="password" class="form-control form-control-lg rounded-3 fs-6" id="passwordInput" placeholder="Ingresá tu contraseña" required>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberCheck">
                                <label class="form-check-label text-muted small" for="rememberCheck">Recordarme</label>
                            </div>
                            <a href="#" class="text-secondary small text-decoration-none">¿Olvidaste tu contraseña?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-salmon w-100 py-2 rounded-3 font-weight-bold text-uppercase tracking-wider">Iniciar Sesión</button>
                        
                        <div class="position-relative my-4 text-center">
                            <hr class="text-muted">
                            <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">o</span>
                        </div>
                        
                        <p class="text-center text-muted small mb-0">
                            ¿No tenés una cuenta? <a href="registro.html" class="text-dark font-weight-bold text-decoration-none border-bottom border-dark pb-1">Registrate acá</a>
                        </p>
                    </form>

                </div> </div>
        </div>
    </div>

</div>
