
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Oliv Taller de Joyas</title>
    <meta
  name="description"
  content="Registrate en Oliv Taller de Joyas para acceder a tu cuenta y conocer nuestras novedades."
/>

    <link rel="stylesheet" href="css/custom.css">



</head>
<body>

    <div class="bg-light d-flex align-items-center justify-content-center min-vh-100" style="background-color: #f8f6f2 !important;">
        
        <div class="container px-4">
            <div class="row justify-content-center">
                <div class="col-12 col-md-6 col-lg-5">
                    
                    <div class="card border-0 shadow-lg p-4 rounded-4" style="background: #ffffff;">
                        
                        <div class="text-center mb-4">
                            <h2 class="h3 font-weight-bold text-dark mb-1">Crear Cuenta en Oliv Taller de Joyas</h2>
                           
                        </div>
                        
                        <form>
                            <div class="mb-3">
                                <label for="nameInput" class="form-label text-secondary small font-weight-bold">Nombre y Apellido</label>
                                <input type="text" class="form-control form-control-lg rounded-3 fs-6" id="nameInput" placeholder="Tu nombre y apellido" required>
                            </div>

                            <div class="mb-3">
                                <label for="emailInput" class="form-label text-secondary small font-weight-bold">Correo Electrónico</label>
                                <input type="email" class="form-control form-control-lg rounded-3 fs-6" id="emailInput" placeholder="nombre@ejemplo.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="passwordInput" class="form-label text-secondary small font-weight-bold">Contraseña</label>
                                <input type="password" class="form-control form-control-lg rounded-3 fs-6" id="passwordInput" placeholder="Creá una contraseña segura" required>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPasswordInput" class="form-label text-secondary small font-weight-bold">Repetir Contraseña</label>
                                <input type="password" class="form-control form-control-lg rounded-3 fs-6" id="confirmPasswordInput" placeholder="Repetí tu contraseña" required>
                            </div>
                            
                            <button type="submit" class="btn btn-salmon w-100 py-2 rounded-3 font-weight-bold text-uppercase tracking-wider">Registrarse</button>
                            
                            <div class="position-relative my-4 text-center">
                                <hr class="text-muted">
                                <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">o</span>
                            </div>
                            
                            <p class="text-center text-muted small mb-0">
                                ¿Ya tenés una cuenta? <a href="login.html" class="text-dark font-weight-bold text-decoration-none border-bottom border-dark pb-1">Iniciá sesión acá</a>
                            </p>
                        </form>

                    </div> </div>
            </div>
        </div>

    </div>

</body>
</html>
